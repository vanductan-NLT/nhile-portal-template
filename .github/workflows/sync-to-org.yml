name: Sync to Org

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    if: ${{ vars.ORG_NAME != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Push to org fork
        run: |
          git remote add org https://x-access-token:${{ secrets.ORG_SYNC_TOKEN }}@github.com/${{ vars.ORG_NAME }}/${{ github.event.repository.name }}.git
          git push org main:incoming
