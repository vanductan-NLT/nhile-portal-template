name: Sync to Org

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to org fork
        run: |
          git remote add org https://x-access-token:${{ secrets.ORG_SYNC_TOKEN }}@github.com/${{ secrets.ORG_NAME }}/${{ github.event.repository.name }}.git
          git push org main
